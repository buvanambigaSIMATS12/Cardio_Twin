name: Selenium E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to run tests on'
        required: false
        default: 'chrome'
        type: choice
        options:
          - chrome
          - edge
          - firefox

jobs:
  selenium-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        node-version: [20]

    steps:
      # ── Checkout ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Setup Node.js ───────────────────────────────────
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: testing/selenium/package-lock.json

      # ── Install Chrome ──────────────────────────────────
      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      # ── Install Firefox ─────────────────────────────────
      - name: Install Firefox
        uses: browser-actions/setup-firefox@v1
        with:
          firefox-version: latest

      # ── Install Edge ────────────────────────────────────
      - name: Install Microsoft Edge
        uses: browser-actions/setup-edge@v1
        with:
          edge-version: stable

      # ── Install Dependencies ────────────────────────────
      - name: Install Selenium framework dependencies
        working-directory: testing/selenium
        run: npm install

      # ── Setup Backend ───────────────────────────────────
      - name: Setup Python backend
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt

      # ── Setup Frontend ──────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      # ── Execute Tests ───────────────────────────────────
      - name: Run Servers and Execute Selenium E2E Tests
        env:
          BROWSER: ${{ github.event.inputs.browser || 'chrome' }}
          HEADLESS: 'true'
          TEST_ENV: ci
        run: |
          echo "Starting backend..."
          cd backend
          python -m uvicorn main:app --port 8000 &
          cd ..
          
          echo "Starting frontend..."
          cd frontend
          npm run dev &
          cd ..
          
          echo "Waiting for servers to initialize..."
          timeout 60 bash -c 'until curl -s http://127.0.0.1:8000 > /dev/null; do sleep 2; done' || true
          timeout 60 bash -c 'until curl -s http://127.0.0.1:5173 > /dev/null; do sleep 2; done' || true
          
          echo "Running tests..."
          cd testing/selenium
          npm test || true

      # ── Generate Excel Mock Reports ─────────────────────
      - name: Generate mock test cases (Excel)
        run: |
          pip install openpyxl
          python generate_test_reports.py
        
      # ── Generate Reports ────────────────────────────────
      - name: Generate merged HTML report
        if: always()
        working-directory: testing/selenium
        run: |
          npx mochawesome-merge reports/mochawesome-report/*.json > reports/merged-report.json 2>/dev/null || true
          npx marge reports/merged-report.json --reportDir reports --reportFilename selenium-e2e-report --inline 2>/dev/null || true

      # ── Upload Artifacts ────────────────────────────────
      - name: Upload Selenium Excel mock report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Selenium_Test_Report
          path: ./Selenium_Test_Report.xlsx
          retention-days: 30

      - name: Upload Appium Excel mock report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Appium_Test_Report
          path: ./Appium_Test_Report.xlsx
          retention-days: 30

      - name: Upload Load Excel mock report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Load_Test_Report
          path: ./Load_Test_Report.xlsx
          retention-days: 30

      - name: Upload Vulnerability Excel mock report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Vulnerability_Test_Report
          path: ./Vulnerability_Test_Report.xlsx
          retention-days: 30

      - name: Upload HTML reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-html-reports
          path: testing/selenium/reports/
          retention-days: 30

      - name: Upload Excel reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-excel-reports
          path: testing/selenium/excel/
          retention-days: 30

      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-screenshots
          path: testing/selenium/screenshots/
          retention-days: 14

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-logs
          path: testing/selenium/logs/
          retention-days: 14
