name: Appium Mobile Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  appium-tests:
    name: Appium Mobile Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Appium Tests
        run: |
          pip install openpyxl
          python generate_test_reports.py
      - name: Upload Appium Report
        uses: actions/upload-artifact@v4
        with:
          name: Appium_Test_Report
          path: ./Appium_Test_Report.xlsx
          retention-days: 30
