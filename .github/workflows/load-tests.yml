name: JMeter Load Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  load-tests:
    name: JMeter Load Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Load Tests
        run: |
          pip install openpyxl
          python generate_test_reports.py
      - name: Upload Load Report
        uses: actions/upload-artifact@v4
        with:
          name: Load_Test_Report
          path: ./Load_Test_Report.xlsx
          retention-days: 30
